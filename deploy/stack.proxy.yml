# Swarm HPA — hardened deployment (least-privilege via docker-socket-proxy).
#
#   IMAGE=ghcr.io/aleksey512/swarm-hpa TAG=latest \
#     docker stack deploy -c deploy/stack.proxy.yml swarm-hpa
#
# The image is also mirrored to Docker Hub — swap IMAGE to pull from there:
#   IMAGE=docker.io/mrframe/swarm-hpa TAG=0.1.0 \
#     docker stack deploy -c deploy/stack.proxy.yml swarm-hpa
#
# tecnativa/docker-socket-proxy exposes ONLY the API surface swarm-hpa needs
# (services/tasks/nodes + POST for ServiceUpdate) over TCP. The daemon then runs
# as NON-root with no socket mount at all. Only the proxy must sit on a manager
# node; swarm-hpa can run anywhere on the overlay network.
version: "3.8"

services:
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:0.2
    environment:
      # Whitelist exactly what the daemon calls; everything else stays 403.
      SERVICES: "1"   # ServiceList / ServiceInspect / ServiceUpdate
      TASKS: "1"      # TaskList
      NODES: "1"      # NodeList
      POST: "1"       # REQUIRED: ServiceUpdate (scale/heal) is an HTTP POST
    volumes:
      - type: bind
        source: /var/run/docker.sock
        target: /var/run/docker.sock
        read_only: true
    networks:
      - hpa
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager   # the proxy needs the manager's socket
      restart_policy:
        condition: any

  swarm-hpa:
    image: ${IMAGE:-ghcr.io/aleksey512/swarm-hpa}:${TAG:-latest}

    # Genuinely non-root: it talks to the proxy over TCP, so there is no
    # root-owned socket to open.
    user: "65532:65532"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

    environment:
      DOCKER_HOST: "tcp://docker-socket-proxy:2375"
      DRY_RUN: "true"            # safety default — log intended actions, apply none
      LOG_LEVEL: "info"
      LOG_FORMAT: "json"
      POLL_INTERVAL: "15s"
      METRICS_ADDR: ":9095"
      METRICS_PROVIDER: "dockerstats"

    networks:
      - hpa

    deploy:
      mode: replicated
      replicas: 1
      # No manager constraint needed — the daemon reaches the proxy via the
      # overlay network from any node. (The proxy carries the manager pin.)
      restart_policy:
        condition: any
        delay: 5s
      resources:
        limits:
          cpus: "0.50"
          memory: 128M
        reservations:
          cpus: "0.05"
          memory: 32M

networks:
  hpa:
    driver: overlay
