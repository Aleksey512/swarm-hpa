<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300" role="img" aria-label="Swarm HPA and Task Healer — horizontal autoscaling and stuck-task healing for Docker Swarm">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2496ED"/>
      <stop offset="1" stop-color="#4aa8f0"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#1c6fd6"/>
      <stop offset="1" stop-color="#4aa8f0"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="1200" height="300" rx="18" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="1199" height="299" rx="18" fill="none" stroke="#30363d"/>
  <rect x="0" y="0" width="6" height="300" fill="url(#accent)"/>

  <!-- left: text block -->
  <text x="60" y="90" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="15" letter-spacing="4" fill="#8b949e">DOCKER SWARM · CONTROL-LOOP DAEMON</text>

  <text x="57" y="160" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="58" font-weight="700" fill="#f0f6fc">Swarm HPA<tspan fill="#2496ED"> &amp; Healer</tspan></text>

  <text x="61" y="200" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="21" fill="#adbac7">Horizontal autoscaling &amp; stuck-task healing for Docker Swarm</text>

  <!-- feature chips -->
  <g font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14">
    <rect x="61" y="226" width="112" height="30" rx="15" fill="#1f2630" stroke="#30363d"/>
    <text x="117" y="246" text-anchor="middle" fill="#c9d1d9">Autoscaling</text>
    <rect x="181" y="226" width="108" height="30" rx="15" fill="#1f2630" stroke="#30363d"/>
    <text x="235" y="246" text-anchor="middle" fill="#c9d1d9">Self-healing</text>
    <rect x="297" y="226" width="152" height="30" rx="15" fill="#1f2630" stroke="#30363d"/>
    <text x="373" y="246" text-anchor="middle" fill="#c9d1d9">Dry-run by default</text>
  </g>

  <!-- right: motif -->
  <g>
    <!-- baseline -->
    <line x1="898" y1="231" x2="1112" y2="231" stroke="#30363d" stroke-width="2"/>

    <!-- ascending bars = autoscaling -->
    <rect x="905" y="176" width="28" height="55"  rx="5" fill="url(#bar)"/>
    <rect x="947" y="146" width="28" height="85"  rx="5" fill="url(#bar)"/>
    <rect x="989" y="121" width="28" height="110" rx="5" fill="url(#bar)"/>
    <rect x="1031" y="91" width="28" height="140" rx="5" fill="url(#bar)"/>
    <rect x="1073" y="66" width="28" height="165" rx="5" fill="url(#bar)"/>

    <text x="1003" y="256" text-anchor="middle" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" fill="#8b949e">autoscale</text>

    <!-- self-heal badge = green check -->
    <circle cx="1140" cy="86" r="25" fill="#12261a" stroke="#3fb950" stroke-width="2"/>
    <polyline points="1129,86 1137,95 1152,74" fill="none" stroke="#3fb950" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="1140" y="132" text-anchor="middle" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" fill="#3fb950">healed</text>
  </g>
</svg>
