name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true

      - name: Check formatting
        run: make fmt-check

      - name: Vet
        run: make vet

      - name: Lint (golangci-lint v2)
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

      - name: Build
        run: make build

      - name: Unit tests (race)
        run: make test-race

      - name: Integration tests
        run: make test-integration

      - name: Coverage summary
        run: make cover
