name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true

      - name: Check formatting
        run: make fmt-check

      - name: Vet
        run: make vet

      - name: Lint (golangci-lint v2)
        uses: golangci/golangci-lint-action@v7
        with:
          # v7 is the golangci-lint v2-capable action (v6 installs v1, which
          # cannot read the v2 .golangci.yml and is built with go1.24 < go.mod
          # 1.25.0). Pin an explicit v2 so CI never resolves to an incompatible
          # build via "latest".
          version: v2.12.2

      - name: Build
        run: make build

      - name: Unit tests (race)
        run: make test-race

      - name: Integration tests
        run: make test-integration

      - name: Coverage summary
        run: make cover

  dockerfile-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint Dockerfile (hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Smoke build (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          build-args: |
            VERSION=ci
          tags: swarm-hpa:ci

  examples-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Parse-only: `docker stack config` (preinstalled on the runner) validates
      # the example stacks without needing an active swarm; shellcheck (also
      # preinstalled) lints loadgen.sh via the make target's guarded step.
      - name: Validate example stacks
        run: make examples-validate
