name: Release

# Publish a multi-arch image to GHCR on version tags (e.g. v1.2.3).
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Docker Hub is a mirror of GHCR (GHCR stays the primary registry).
      # Requires repo secrets DOCKERHUB_USERNAME + DOCKERHUB_TOKEN (Read & Write
      # access token). Without them this step fails — set them before tagging.
      # No `registry:` → defaults to docker.io.
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          # One build → both registries. metadata-action lowercases the repo
          # name for GHCR and fans every tag rule out to each image below.
          images: |
            ghcr.io/${{ github.repository }}
            docker.io/mrframe/swarm-hpa
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ github.ref_name }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
